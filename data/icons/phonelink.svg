<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Phone body -->
  <rect x="32" y="8" width="64" height="112" rx="12" ry="12"
        fill="#3584e4" stroke="#1c71d8" stroke-width="3"/>
  <!-- Screen -->
  <rect x="38" y="22" width="52" height="78" rx="4" ry="4" fill="#ffffff"/>
  <!-- Top speaker -->
  <rect x="52" y="14" width="24" height="3" rx="1.5" fill="#1c71d8" opacity="0.5"/>
  <!-- Home indicator -->
  <rect x="50" y="106" width="28" height="3" rx="1.5" fill="#1c71d8" opacity="0.5"/>
  <!-- Link/sync arrows on screen -->
  <!-- Arrow going right (upload) -->
  <g transform="translate(64, 52)">
    <path d="M-12,6 L8,6 L8,12 L18,0 L8,-12 L8,-6 L-12,-6 Z"
          fill="#3584e4" opacity="0.85"/>
  </g>
  <!-- Arrow going left (download) -->
  <g transform="translate(64, 72)">
    <path d="M12,-6 L-8,-6 L-8,-12 L-18,0 L-8,12 L-8,6 L12,6 Z"
          fill="#26a269" opacity="0.85"/>
  </g>
  <!-- Connection dot top-right -->
  <circle cx="98" cy="20" r="8" fill="#26a269"/>
  <circle cx="98" cy="20" r="4" fill="#ffffff"/>
  <!-- Small signal arcs -->
  <path d="M100,12 A12,12 0 0,1 106,20" fill="none" stroke="#26a269" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M102,6 A18,18 0 0,1 112,20" fill="none" stroke="#26a269" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
