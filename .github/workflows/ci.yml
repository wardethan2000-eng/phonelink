name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use the distro's python3 (not actions/setup-python) so the apt-installed
      # GObject-Introspection typelibs are importable.  No display is needed —
      # the panel tests exercise reconciliation without constructing widgets.
      - name: Install GTK4 / Libadwaita typelibs and pytest
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python3-gi gir1.2-gtk-4.0 gir1.2-adw-1 python3-pytest

      - name: Byte-compile all modules
        run: python3 -m compileall -q phonelink

      - name: Run test suite
        run: python3 -m pytest -q
